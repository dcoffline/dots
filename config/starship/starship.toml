command_timeout = 5000
scan_timeout = 1000

[username]
show_always = true
style_user = "bg:#3B4252"
style_root = "bg:#3B4252"
format = '[ $user ]($style)'

[container]
symbol = "пҶІ"
format = '[ $symbol $name ]($style)'
style = 'bg:#434C5E'
disabled = false

[directory]
style = 'bg:#4C566A'
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
# Shorten some long paths by text replacement
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"Videos" = "оқ· " 
"dots" = "оҳӨ "
".config" = "оҳһ "
".local" = "вҢҳ "

[git_branch]
symbol = "п„“"
style = "fg:#3B4252 bg:#86BBD8"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bold red bg:#86BBD8"
format = '[$all_status$ahead_behind ]($style)'

[os]
disabled = false
style = "bg:#06969A"
format = "[ $symbol ]($style)"

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#33658A"
format = '[ $time ]($style)'

