format = """
[оӮ¶](#3B4252)\
$python\
$username\
[оӮ°](fg:#3B4252 bg:#434C5E)\
$container\
[оӮ°](fg:#434C5E bg:#4C566A)\
$directory\
[оӮ°](fg:#4C566A bg:#86BBD8)\
$git_branch\
$git_status\
[оӮ°](fg:#86BBD8 bg:#06969A)\
$c\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
[оӮ°](fg:#06969A bg:#33658A)\
$time\
[оӮҙ ](fg:#33658A)\
"""
command_timeout = 5000
# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like п„  to save some space
[username]
show_always = true
style_user = "bg:#3B4252"
style_root = "bg:#3B4252"
format = '[ $user ]($style)'

# Custom container module
[container]
symbol = "пҶІ"
format = '[ $symbol ]($style)'
style = 'bg:#434C5E'
disabled = false

[directory]
style = "bg:#4C566A"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = " у°Ҳҷ "
"Downloads" = " пҖҷ "
"Music" = " пҖҒ "
"Pictures" = " пҖҫ "
".config" = " оҳһ "
".local" = " вҢҳ "
"debrid-stack" = " оҳӨ "

# Keep in mind that the order matters. For example:
# "Important Documents" = " пңҳп„Ә "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important пңҳ " = " пңҳп„Ә "

[c]
symbol = "оҳһ "
style = "bg:#06969A"
format = '[ $symbol ($version) ]($style)'

[elixir]
symbol = "оүө "
style = "bg:#06969A"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = "оҳ¬ "
style = "bg:#06969A"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = "п„“"
style = "bg:#86BBD8"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#86BBD8"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = "оҳ§ "
style = "bg:#06969A"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = "оқ· "
style = "bg:#06969A"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = "оү– "
style = "bg:#06969A"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = "оҳӨ "
style = "bg:#06969A"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#06969A"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "пҡӨ "
style = "bg:#06969A"
format = '[ $symbol ($version) ]($style)'

[python]
style = "bg:#06969A"
format = '[(\($virtualenv\) )]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#06969A"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#33658A"
format = '[ $time ]($style)'

